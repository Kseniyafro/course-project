{% extends 'mfc/base.html' %}
{% load static %}

{% block title %}Вход в систему — МФЦ{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'mfc/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Вход для Персонала / Операторов</h2>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="auth-form-group">
            {{ form.as_p }}
        </div>
        <button type="submit" class="form-submit">Войти в систему</button>
    </form>
    
    <p class="auth-footer">
        Нет аккаунта оператора? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
