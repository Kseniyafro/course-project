{% extends 'mfc/base.html' %}
{% load static %}

{% block title %}Регистрация оператора — МФЦ{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'mfc/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Регистрация нового сотрудника</h2>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        <div class="auth-form-group">
            {{ form.as_p }}
        </div>
        <button type="submit" class="form-submit">Создать аккаунт</button>
    </form>
    
    <p class="auth-footer">
        Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
    </p>
</div>
{% endblock %}
